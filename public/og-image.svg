<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <rect width="1200" height="630" fill="#1e1b4b"/>
  <rect x="0" y="0" width="1200" height="630" fill="url(#gradient)"/>
  
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f472b6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="200" fill="#4f46e5" opacity="0.3"/>
  <circle cx="1100" cy="530" r="300" fill="#7c3aed" opacity="0.2"/>
  
  <!-- Main text -->
  <text x="600" y="280" font-family="system-ui, -apple-system, sans-serif" font-size="80" font-weight="bold" fill="white" text-anchor="middle">IdeaFlow</text>
  
  <!-- Tagline -->
  <text x="600" y="360" font-family="system-ui, -apple-system, sans-serif" font-size="36" fill="#c4b5fd" text-anchor="middle">Turn Ideas into Action</text>
  
  <!-- Subtext -->
  <text x="600" y="420" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="#a78bfa" text-anchor="middle">AI-Powered Project Planning</text>
  
  <!-- CTA -->
  <rect x="450" y="470" width="300" height="60" rx="30" fill="url(#glow)"/>
  <text x="600" y="512" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="600" fill="white" text-anchor="middle">Get Started Free</text>
  
  <!-- URL -->
  <text x="600" y="590" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#818cf8" text-anchor="middle">ideaflow.ai</text>
</svg>