        requestId:
          type: string
          example: req_1704625200000_abc123def
        retryable:
          type: boolean
          description: Whether the request can be retried
          example: false

    GetIdeaSessionResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/IdeaSession'
              nullable: true

    IdeaSession:
      type: object
      description: Clarification or breakdown session associated with an idea
      properties:
        id:
          type: string
          example: session_1704625200000_abc123
        ideaId:
          type: string
          example: idea_1704625200000_abc123def
        type:
          type: string
          enum: [clarification, breakdown]
          example: clarification
        status:
          type: string
          enum: [in_progress, completed, abandoned]
          example: in_progress
        data:
          type: object
          description: Session-specific data (questions, answers, deliverables, etc.)
        createdAt:
          type: string
          format: date-time
          example: '2024-01-07T00:00:00Z'
        updatedAt:
          type: string
          format: date-time
          example: '2024-01-07T00:00:00Z'

    GetIdeaTasksResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              type: object
              required:
                - ideaId
                - deliverables
                - summary
              properties:
                ideaId:
                  type: string
                  example: idea_1704625200000_abc123def
                deliverables:
                  type: array
                  items:
                    $ref: '#/components/schemas/DeliverableWithTasks'
                summary:
                  $ref: '#/components/schemas/TasksSummary'

    DeliverableWithTasks:
      allOf:
        - $ref: '#/components/schemas/Deliverable'
        - type: object
          properties:
            tasks:
              type: array
              items:
                $ref: '#/components/schemas/Task'
            progress:
              type: integer
              minimum: 0
              maximum: 100
              description: Completion percentage for this deliverable
              example: 45
            completedCount:
              type: integer
              example: 3
            totalCount:
              type: integer
              example: 7
            totalHours:
              type: number
              example: 32.5
            completedHours:
              type: number
              example: 12.0

    TasksSummary:
      type: object
      properties:
        totalDeliverables:
          type: integer
          example: 3
        totalTasks:
          type: integer
          example: 15
        completedTasks:
          type: integer
          example: 5
        totalHours:
          type: number
          description: Total estimated hours across all tasks
          example: 120.5
        completedHours:
          type: number
          description: Estimated hours for completed tasks
          example: 40.0
        overallProgress:
          type: integer
          minimum: 0
          maximum: 100
          description: Overall completion percentage
          example: 33

    CspReportRequest:
      type: object
      required:
        - csp-report
      properties:
        csp-report:
          type: object
          required:
            - document-uri
            - violated-directive
          properties:
            document-uri:
              type: string
              description: The URI of the document where the violation occurred
              example: https://example.com/page
            referrer:
              type: string
              description: The referrer of the request
              example: https://example.com/
            violated-directive:
              type: string
              description: The CSP directive that was violated
              example: script-src
            effective-directive:
              type: string
              description: The directive that actually enforced the policy
              example: script-src-elem
            original-policy:
              type: string
              description: The complete CSP policy
            blocked-uri:
              type: string
              description: The URI of the resource that was blocked
              example: https://evil.com/malware.js
            status-code:
              type: integer
              description: HTTP status code of the request
              example: 200
            script-sample:
              type: string
              description: First 40 characters of the inline script
            source-file:
              type: string
              description: URL of the file where the violation occurred
            line-number:
              type: integer
              description: Line number in the source file
            column-number:
              type: integer
              description: Column number in the source file

    RateLimitStatsResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              type: object
              required:
                - timestamp
                - totalEntries
                - expiredEntries
                - topUsers
                - rateLimitConfigs
                - tieredRateLimits
              properties:
                timestamp:
                  type: string
                  format: date-time
                  example: '2024-01-07T00:00:00Z'
                totalEntries:
                  type: integer
                  description: Total number of rate limit entries
                  example: 150
                expiredEntries:
                  type: integer
                  description: Number of expired entries pending cleanup
                  example: 12
                entriesByRole:
                  type: object
                  additionalProperties:
                    type: integer
                  description: Count of entries by user role
                  example:
                    anonymous: 50
                    authenticated: 80
                    premium: 20
                topUsers:
                  type: array
                  description: Top users by request count
                  items:
                    type: object
                    properties:
                      identifier:
                        type: string
                        example: 192.168.1.1
                      count:
                        type: integer
                        example: 45
                rateLimitConfigs:
                  type: object
                  description: Active rate limit configurations
                  additionalProperties:
                    type: object
                    properties:
                      windowMs:
                        type: integer
                        example: 60000
                      maxRequests:
                        type: integer
                        example: 30
                  example:
                    strict:
                      windowMs: 60000
                      maxRequests: 10
                    moderate:
                      windowMs: 60000
                      maxRequests: 30
                    lenient:
                      windowMs: 60000
                      maxRequests: 60
                tieredRateLimits:
                  type: object
                  description: Rate limits by user tier
                  additionalProperties:
                    type: object
                    properties:
                      windowMs:
                        type: integer
                        example: 60000
                      maxRequests:
                        type: integer
                        example: 60

    ClearRateLimitResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              type: object
              required:
                - message
                - timestamp
              properties:
                message:
                  type: string
                  example: Rate limit store cleared successfully
                timestamp:
                  type: string
                  format: date-time
                  example: '2024-01-07T00:00:00Z'

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Supabase JWT authentication. Include the access token in the Authorization header.
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: API key authentication (admin routes only)

  security: []
