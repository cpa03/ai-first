openapi: 3.0.3
info:
  title: IdeaFlow API
  description: API for turning raw ideas into production-ready plans with AI-powered clarification and breakdown
  version: 1.0.0
  contact:
    name: IdeaFlow Team
    url: https://github.com/cpa03/ai-first
  license:
    name: MIT

servers:
  - url: http://localhost:3000
    description: |
      Local development server (default).

      **Configuration:** Set via `BASE_URL` or `NEXT_PUBLIC_APP_URL` environment variable.
      See `config/.env.example` for all available options.

      Example: `BASE_URL=http://localhost:3000 npm run dev`
  - url: https://{environment}.vercel.app
    description: Vercel preview deployment
    variables:
      environment:
        description: Vercel deployment URL (e.g., your-app-git-main-username)
        default: your-app
  - url: https://{domain}
    description: |
      Production server.

      **Configuration:** Set via `NEXT_PUBLIC_APP_URL` environment variable.
      Example: `NEXT_PUBLIC_APP_URL=https://ideaflow.ai`
    variables:
      domain:
        description: Production domain (e.g., ideaflow.ai)
        default: ideaflow.ai

tags:
  - name: Clarification
    description: AI-powered idea clarification and question generation
  - name: Breakdown
    description: Automatic idea decomposition into tasks and deliverables
  - name: Health
    description: System health monitoring and status checks
  - name: Ideas
    description: Ideas management and CRUD operations
  - name: Tasks
    description: Task management within deliverables
  - name: Deliverables
    description: Deliverable management and task creation
  - name: Metrics
    description: Prometheus metrics for monitoring
  - name: Security
    description: Security-related endpoints (CSP reporting)
  - name: Admin
    description: Administrative endpoints requiring elevated privileges

paths:
  /api/clarify:
    post:
      tags:
        - Clarification
      summary: Start clarification with generated questions
      description: Generates clarifying questions based on the provided idea
      operationId: startClarification
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StartClarificationRequest'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StartClarificationResponse'
        '400':
          description: Bad request - validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/clarify/start:
    post:
      tags:
        - Clarification
      summary: Start clarification session
      description: Alternative endpoint to start a clarification session
      operationId: startClarificationSession
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StartClarificationSessionRequest'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StartClarificationSessionResponse'
        '400':
          description: Bad request - validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      tags:
        - Clarification
      summary: Get clarification session
      description: Retrieve an existing clarification session by idea ID
      operationId: getClarificationSession
      parameters:
        - name: ideaId
          in: query
          required: true
          description: Unique identifier for the idea
          schema:
            type: string
            example: idea_1704625200000_abc123def
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetClarificationSessionResponse'
        '400':
          description: Bad request - validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Session not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/clarify/answer:
    post:
      tags:
        - Clarification
      summary: Submit answer to question
      description: Submit user's answer to a specific clarifying question
      operationId: submitAnswer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmitAnswerRequest'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubmitAnswerResponse'
        '400':
          description: Bad request - validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/clarify/complete:
    post:
      tags:
        - Clarification
      summary: Complete clarification
      description: Complete the clarification process and generate refined idea
      operationId: completeClarification
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompleteClarificationRequest'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompleteClarificationResponse'
        '400':
          description: Bad request - validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/breakdown:
    post:
      tags:
        - Breakdown
      summary: Start idea breakdown
      description: Decompose an idea into sub-ideas, deliverables, and tasks
      operationId: startBreakdown
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StartBreakdownRequest'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StartBreakdownResponse'
        '400':
          description: Bad request - validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      tags:
        - Breakdown
      summary: Get breakdown session
      description: Retrieve an existing breakdown session by idea ID
      operationId: getBreakdownSession
      parameters:
        - name: ideaId
          in: query
          required: true
          description: Unique identifier for the idea
          schema:
            type: string
            example: idea_1704625200000_abc123def
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetBreakdownSessionResponse'
        '400':
          description: Bad request - validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Session not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/health:
    get:
      tags:
        - Health
      summary: Environment health check
      description: Check environment configuration and required variables
      operationId: healthCheck
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthCheckResponse'

  /api/health/database:
    get:
      tags:
        - Health
      summary: Database health check
      description: Check database connectivity and performance
      operationId: databaseHealthCheck
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatabaseHealthCheckResponse'

  /api/health/detailed:
    get:
      tags:
        - Health
      summary: Comprehensive health check
      description: Check all system components and services
      operationId: detailedHealthCheck
      responses:
        '200':
          description: System is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailedHealthCheckResponse'
        '503':
          description: System is unhealthy or degraded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailedHealthCheckResponse'

  /api/health/live:
    get:
      tags:
        - Health
      summary: Liveness probe
      description: Kubernetes liveness probe - checks if the container should be restarted
      operationId: livenessProbe
      responses:
        '200':
          description: Application is alive
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LivenessProbeResponse'

  /api/health/ready:
    get:
      tags:
        - Health
      summary: Readiness probe
      description: Kubernetes readiness probe - checks if the container can receive traffic
      operationId: readinessProbe
      responses:
        '200':
          description: Application is ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadinessProbeResponse'
        '503':
          description: Application is not ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadinessProbeResponse'

  /api/health/integrations:
    get:
      tags:
        - Health
      summary: Integrations health check
      description: |
        Check the health status of all external integrations and services.
        Returns the status of circuit breakers, export connectors, and external APIs.
        Useful for monitoring external service dependencies.
      operationId: integrationsHealthCheck
      responses:
        '200':
          description: Integrations health check successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IntegrationsHealthResponse'
        '503':
          description: One or more integrations are unhealthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IntegrationsHealthResponse'

  /api/ideas:
    get:
      tags:
        - Ideas
      summary: List ideas
      description: Retrieve a paginated list of ideas for the authenticated user
      operationId: listIdeas
      security:
        - BearerAuth: []
      parameters:
        - name: status
          in: query
          description: Filter by idea status
          schema:
            type: string
            enum: [draft, clarified, breakdown, completed, all]
            example: draft
        - name: limit
          in: query
          description: Maximum number of results to return
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
            example: 10
        - name: offset
          in: query
          description: Number of results to skip
          schema:
            type: integer
            minimum: 0
            default: 0
            example: 0
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListIdeasResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags:
        - Ideas
      summary: Create idea
      description: Create a new idea for the authenticated user
      operationId: createIdea
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateIdeaRequest'
      responses:
        '201':
          description: Idea created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateIdeaResponse'
        '400':
          description: Bad request - validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/ideas/{id}:
    get:
      tags:
        - Ideas
      summary: Get idea
      description: Retrieve a specific idea by ID
      operationId: getIdea
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Unique identifier for the idea
          schema:
            type: string
            example: idea_1704625200000_abc123def
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetIdeaResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Idea not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags:
        - Ideas
      summary: Update idea
      description: Update an existing idea
      operationId: updateIdea
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Unique identifier for the idea
          schema:
            type: string
            example: idea_1704625200000_abc123def
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateIdeaRequest'
      responses:
        '200':
          description: Idea updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateIdeaResponse'
        '400':
          description: Bad request - validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Idea not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags:
        - Ideas
      summary: Delete idea
      description: Soft delete an idea
      operationId: deleteIdea
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Unique identifier for the idea
          schema:
            type: string
            example: idea_1704625200000_abc123def
      responses:
        '200':
          description: Idea deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteIdeaResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Idea not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/tasks/{id}:
    get:
      tags:
        - Tasks
      summary: Get task
      description: Retrieve a specific task by ID with ownership information
      operationId: getTask
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Unique identifier for the task
          schema:
            type: string
            example: task_123
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetTaskResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Task not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags:
        - Tasks
      summary: Update task
      description: Update an existing task
      operationId: updateTask
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Unique identifier for the task
          schema:
            type: string
            example: task_123
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTaskRequest'
      responses:
        '200':
          description: Task updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateTaskResponse'
        '400':
          description: Bad request - validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Task not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags:
        - Tasks
      summary: Delete task
      description: Soft delete a task
      operationId: deleteTask
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Unique identifier for the task
          schema:
            type: string
            example: task_123
      responses:
        '200':
          description: Task deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteTaskResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Task not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/tasks/{id}/status:
    patch:
      tags:
        - Tasks
      summary: Update task status
      description: Update only the status of a task
      operationId: updateTaskStatus
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Unique identifier for the task
          schema:
            type: string
            example: task_123
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTaskStatusRequest'
      responses:
        '200':
          description: Task status updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateTaskStatusResponse'
        '400':
          description: Bad request - validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Task not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/deliverables/{id}/tasks:
    post:
      tags:
        - Deliverables
      summary: Create task in deliverable
      description: Create a new task within a deliverable
      operationId: createTaskInDeliverable
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Unique identifier for the deliverable
          schema:
            type: string
            example: deliverable_1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTaskRequest'
      responses:
        '201':
          description: Task created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateTaskResponse'
        '400':
          description: Bad request - validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Deliverable not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/metrics:
    get:
      tags:
        - Metrics
      summary: Prometheus metrics
      description: Get Prometheus-compatible metrics for monitoring
      operationId: getMetrics
      responses:
        '200':
          description: Prometheus metrics in text format
          content:
            text/plain:
              schema:
                type: string
                example: |
                  # HELP http_request_duration_seconds Duration of HTTP requests in seconds
                  # TYPE http_request_duration_seconds histogram
                  http_request_duration_seconds_bucket{method="GET",route="/api/health",status_code="200",le="0.001"} 15
                  http_request_duration_seconds_bucket{method="GET",route="/api/health",status_code="200",le="0.005"} 42

  /api/ideas/{id}/session:
    get:
      tags:
        - Ideas
      summary: Get idea session
      description: Retrieve the clarification/breakdown session associated with an idea
      operationId: getIdeaSession
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Unique identifier for the idea
          schema:
            type: string
            example: idea_1704625200000_abc123def
      responses:
        '200':
          description: Session retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetIdeaSessionResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Idea or session not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/ideas/{id}/tasks:
    get:
      tags:
        - Ideas
      summary: Get idea tasks
      description: Retrieve all tasks for an idea with deliverables and progress summary
      operationId: getIdeaTasks
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Unique identifier for the idea
          schema:
            type: string
            example: idea_1704625200000_abc123def
      responses:
        '200':
          description: Tasks retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetIdeaTasksResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Idea or deliverables not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/csp-report:
    post:
      tags:
        - Security
      summary: CSP violation report
      description: |
        Content Security Policy violation report endpoint.
        Browsers automatically send reports to this endpoint when CSP violations occur.
        Used for security monitoring and incident response.
      operationId: reportCspViolation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CspReportRequest'
          application/csp-report:
            schema:
              $ref: '#/components/schemas/CspReportRequest'
      responses:
        '204':
          description: Report received (no content returned)
    options:
      tags:
        - Security
      summary: CSP report CORS preflight
      description: CORS preflight handler for CSP report endpoint
      operationId: cspReportPreflight
      responses:
        '204':
          description: CORS preflight successful

  /api/admin/rate-limit:
    get:
      tags:
        - Admin
      summary: Get rate limit statistics
      description: |
        Retrieve current rate limiting statistics including total entries,
        top users, and configuration details. Requires admin authentication.
      operationId: getRateLimitStats
      security:
        - ApiKeyAuth: []
      responses:
        '200':
          description: Rate limit statistics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RateLimitStatsResponse'
        '401':
          description: Unauthorized - Admin access required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags:
        - Admin
      summary: Clear rate limit store
      description: |
        Clear all rate limit entries from the store.
        Use with caution - this resets all rate limiting state.
        Requires admin authentication.
      operationId: clearRateLimitStore
      security:
        - ApiKeyAuth: []
      responses:
        '200':
          description: Rate limit store cleared successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClearRateLimitResponse'
        '401':
          description: Unauthorized - Admin access required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    ApiResponse:
      type: object
      required:
        - success
        - data
        - requestId
        - timestamp
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
        requestId:
          type: string
          example: req_1704625200000_abc123def
        timestamp:
          type: string
          format: date-time
          example: '2024-01-07T00:00:00Z'

    Idea:
      type: object
      properties:
        id:
          type: string
          example: idea_1704625200000_abc123def
        user_id:
          type: string
          example: user_123
        title:
          type: string
          example: My New SaaS Product
        raw_text:
          type: string
          example: I want to build a landing page for my new SaaS product
        status:
          type: string
          enum: [draft, clarified, breakdown, completed]
          example: draft
        created_at:
          type: string
          format: date-time
