# ============================================================
# Cloudflare Workers Configuration for OpenNext
# ============================================================
# This project uses @opennextjs/cloudflare (recommended) instead of
# the deprecated @cloudflare/next-on-pages package.
#
# @see https://opennext.js.org/cloudflare
# @see https://developers.cloudflare.com/workers/wrangler/configuration/
#
# Best Practices Applied:
# - nodejs_compat: Enables Node.js APIs in Workers
# - global_fetch_strictly_public: Security flag for fetch requests
# - Static assets served via Workers with proper caching (_headers)
# ============================================================

name = "ai-first"
compatibility_date = "2025-02-18"
compatibility_flags = ["nodejs_compat", "global_fetch_strictly_public"]

# OpenNext outputs the worker to .open-next/worker.js
main = ".open-next/worker.js"

# Assets binding for static files served by Cloudflare
[assets]
directory = ".open-next/assets"
binding = "ASSETS"

# ============================================================
# Production Environment
# ============================================================
[env.production]
name = "ai-first"

# Environment variables (set via Cloudflare dashboard or GitHub Actions secrets)
# DO NOT hardcode sensitive values here
[env.production.vars]
# NEXT_PUBLIC_APP_URL = "https://ideaflow.ai"

# ============================================================
# Staging Environment
# ============================================================
[env.staging]
name = "ai-first-staging"

[env.staging.vars]
# NEXT_PUBLIC_APP_URL = "https://staging.ideaflow.ai"

# ============================================================
# Deployment Notes
# ============================================================
# Build command: npm run build:cloudflare
# Deploy command: npm run deploy:cloudflare
# Preview locally: npm run preview:cloudflare
#
# Environment Variable Management:
# - Use `wrangler secret put` for secure runtime variables
# - Or use scripts/setup-cloudflare-env.sh for automated setup
# - This is a Workers deployment (not Pages), so use Workers secrets API
#
# Required environment variables in Cloudflare dashboard:
# - NEXT_PUBLIC_SUPABASE_URL
# - NEXT_PUBLIC_SUPABASE_ANON_KEY
# - SUPABASE_SERVICE_ROLE_KEY
# - OPENAI_API_KEY (or ANTHROPIC_API_KEY)
# - COST_LIMIT_DAILY
# - NEXT_PUBLIC_APP_URL
